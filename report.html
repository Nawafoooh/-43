<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>منصة التقارير الأسبوعية</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    padding:20px;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, textarea{
    width:100%;
    margin:10px 0;
    padding:8px;
}

button{
    padding:10px 20px;
    margin-top:15px;
    background:#2c3e50;
    color:white;
    border:none;
    cursor:pointer;
}

.report{
    margin-top:30px;
    padding:20px;
    border:1px solid #ccc;
}

.footer{
    margin-top:40px;
    border-top:1px solid #000;
    padding-top:10px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h2>إعداد التقرير الأسبوعي</h2>

<label>الفترة:</label>
<input type="text" id="period" placeholder="مثال: من الأحد إلى الخميس">

<label>متابعة التأخير:</label>
<textarea id="delay"></textarea>

<label>متابعة الغياب:</label>
<textarea id="absence"></textarea>

<label>حالات الغياب (3 أيام / 5 أيام):</label>
<textarea id="cases"></textarea>

<label>تكريم المتفوقين:</label>
<textarea id="honor"></textarea>

<label>متابعة المرشد الطلابي:</label>
<textarea id="counselor"></textarea>

<label>الأنشطة المدرسية:</label>
<textarea id="activities"></textarea>

<button onclick="generateReport()">عرض التقرير</button>
<button onclick="downloadPDF()">تحميل PDF</button>

<div id="output" class="report" style="display:none;"></div>

</div>

<script>
function generateReport(){
    const output = document.getElementById("output");
    output.style.display="block";
    output.innerHTML = `
        <h2 style="text-align:center;">التقرير الأسبوعي لشؤون الطلاب</h2>
        <p><strong>الفترة:</strong> ${period.value}</p>
        <h3>أولاً: متابعة التأخير</h3>
        <p>${delay.value}</p>
        <h3>ثانياً: متابعة الغياب</h3>
        <p>${absence.value}</p>
        <h3>ثالثاً: دراسة الحالات</h3>
        <p>${cases.value}</p>
        <h3>رابعاً: تكريم المتفوقين</h3>
        <p>${honor.value}</p>
        <h3>خامساً: متابعة المرشد الطلابي</h3>
        <p>${counselor.value}</p>
        <h3>سادساً: الأنشطة المدرسية</h3>
        <p>${activities.value}</p>

        <div class="footer">
            وكيل المدرسة لشؤون الطلاب<br>
            نواف الصبحي<br><br>
            مدير المدرسة<br>
            خالد المطيري
        </div>
    `;
}

function downloadPDF(){
    const element = document.getElementById("output");
    html2pdf().from(element).save("التقرير_الأسبوعي.pdf");
}
</script>

</body>
</html>
