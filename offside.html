<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VAR · OFFSIDE · AI · تحليل التسلل</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: #0a1a0a;
  font-family: 'Cairo', 'Courier New', monospace;
  color: #e0f0e0;
  overflow-x: hidden;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

@keyframes scan {
  0% { transform: translateY(-100%); }
  100% { transform: translateY(100%); }
}

.scan-line {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, transparent, #22ee66, transparent);
  animation: scan 2s linear infinite;
  pointer-events: none;
  z-index: 10;
}

::-webkit-scrollbar {
  width: 5px;
  height: 5px;
}

::-webkit-scrollbar-track {
  background: #1a2a1a;
}

::-webkit-scrollbar-thumb {
  background: #2a5a2a;
  border-radius: 3px;
}

button, input {
  font-family: 'Cairo', 'Courier New', monospace;
}

.upload-area {
  border: 2px dashed #2a5a2a;
  transition: all 0.3s;
}

.upload-area:hover {
  border-color: #22ee66;
  background: rgba(34, 238, 102, 0.05);
}

.upload-area.dragover {
  border-color: #ffaa00;
  background: rgba(255, 170, 0, 0.05);
}

.offside-line {
  position: absolute;
  width: 3px;
  background: repeating-linear-gradient(
    45deg,
    #ff3333,
    #ff3333 10px,
    #ff9999 10px,
    #ff9999 20px
  );
  box-shadow: 0 0 15px #ff0000;
  animation: pulse 1.5s infinite;
}

canvas {
  max-width: 100%;
  height: auto;
  border-radius: 8px;
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

// قوانين التسلل
const OFFSIDE_RULES = {
  // لاعب في نصف ملعب الخصم
  MUST_BE_IN_OPPONENT_HALF: true,
  // أقرب لخط المرمى من ثاني آخر مدافع
  MUST_BE_AHEAD_OF_SECOND_LAST_DEFENDER: true,
  // مشارك في اللعب النشط
  MUST_BE_INVOLVED_IN_PLAY: true
};

// خوارزمية تحليل التسلل (محاكاة)
const analyzeOffside = (players, ballPosition, lastDefenderLine) => {
  if (!players || players.length === 0) return null;
  
  // تحديد أقرب لاعب هجومي لخط المرمى
  const attackingPlayers = players.filter(p => p.team === 'attack');
  if (attackingPlayers.length === 0) return null;
  
  // ترتيب اللاعبين حسب المسافة من خط المرمى
  const sortedAttackers = [...attackingPlayers].sort((a, b) => b.x - a.x);
  const furthestAttacker = sortedAttackers[0];
  
  // التحقق من التسلل
  const isOffside = furthestAttacker.x > lastDefenderLine && 
                    furthestAttacker.x > 400 && // نصف الملعب
                    furthestAttacker.involvedInPlay !== false;
  
  // حساب المسافة
  const distanceBeyond = furthestAttacker.x - lastDefenderLine;
  
  // تفاصيل اللاعبين
  const details = attackingPlayers.map(p => ({
    ...p,
    isOffside: p.x > lastDefenderLine && p.x > 400,
    distanceBeyond: p.x > lastDefenderLine ? p.x - lastDefenderLine : 0
  }));
  
  return {
    isOffside,
    furthestAttacker,
    distanceBeyond: distanceBeyond > 0 ? distanceBeyond : 0,
    lastDefenderLine,
    details,
    decision: isOffside ? 'تسلل ❌' : 'تسلل ✅',
    confidence: isOffside ? 
      85 + Math.floor(Math.random() * 10) : // تسلل: 85-95%
      90 + Math.floor(Math.random() * 8)     // غير تسلل: 90-98%
  };
};

// كشف اللاعبين (محاكاة)
const detectPlayers = (imageData, width, height) => {
  // هذه محاكاة لكشف اللاعبين باستخدام الذكاء الاصطناعي
  // في التطبيق الحقيقي، نستخدم نموذج تعلم عميق مثل YOLO أو TensorFlow.js
  
  const players = [];
  const numPlayers = 7 + Math.floor(Math.random() * 4); // 7-10 لاعبين
  
  // ألوان الفرق
  const colors = {
    attack: '#22ee66', // أخضر
    defend: '#3d90ff'  // أزرق
  };
  
  // خط الـ 18 ياردة (منطقة الجزاء)
  const PENALTY_AREA_START = width * 0.7;
  const PENALTY_AREA_END = width * 0.95;
  
  for (let i = 0; i < numPlayers; i++) {
    // توزيع عشوائي للاعبين
    const team = i < numPlayers * 0.4 ? 'attack' : 'defend'; // 40% هجوم، 60% دفاع
    const isAttacker = team === 'attack';
    
    // اللاعبون الهجوميون يكونون أقرب لمرمى الخصم
    let x, y;
    
    if (isAttacker) {
      // مهاجمون في منطقة الخصم
      x = PENALTY_AREA_START + Math.random() * (width * 0.25);
      y = 50 + Math.random() * (height - 100);
    } else {
      // مدافعون في مناطق متفرقة
      x = 50 + Math.random() * (width * 0.6);
      y = 50 + Math.random() * (height - 100);
    }
    
    // حارس مرمى
    if (i === numPlayers - 1 && team === 'defend') {
      x = width * 0.9;
      y = height / 2;
    }
    
    players.push({
      id: i,
      team,
      x,
      y,
      num: Math.floor(Math.random() * 30) + 1,
      name: isAttacker ? ['مهاجم', 'جناح', 'رأس حربة'][Math.floor(Math.random() * 3)] : 
                         ['مدافع', 'قلب دفاع', 'ظهير'][Math.floor(Math.random() * 3)],
      involvedInPlay: Math.random() > 0.2 // 80% مشارك في اللعب
    });
  }
  
  return players;
};

// مكون عرض الصورة مع التحليل
function ImageAnalyzer({ imageSrc }) {
  const canvasRef = useRef(null);
  const [analysis, setAnalysis] = useState(null);
  const [loading, setLoading] = useState(false);
  const [lastDefenderLine, setLastDefenderLine] = useState(400);
  const [showScanLine, setShowScanLine] = useState(false);
  const [players, setPlayers] = useState([]);
  
  useEffect(() => {
    if (!imageSrc || !canvasRef.current) return;
    
    const analyzeImage = async () => {
      setLoading(true);
      setShowScanLine(true);
      
      const canvas = canvasRef.current;
      const ctx = canvas.getContext('2d');
      const img = new Image();
      
      img.onload = () => {
        // ضبط حجم الكانفس
        canvas.width = 800;
        canvas.height = 500;
        
        // رسم الصورة
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        
        // محاكاة كشف اللاعبين
        setTimeout(() => {
          // كشف اللاعبين
          const detectedPlayers = detectPlayers(null, canvas.width, canvas.height);
          setPlayers(detectedPlayers);
          
          // تحديد خط ثاني آخر مدافع
          const defenders = detectedPlayers.filter(p => p.team === 'defend');
          const sortedDefenders = defenders.sort((a, b) => b.x - a.x);
          const secondLastDefender = sortedDefenders[1] || defenders[0];
          
          const offsideLine = secondLastDefender ? secondLastDefender.x : 400;
          setLastDefenderLine(offsideLine);
          
          // تحليل التسلل
          const result = analyzeOffside(detectedPlayers, null, offsideLine);
          setAnalysis(result);
          
          // رسم العناصر على الصورة
          drawAnalysis(ctx, detectedPlayers, offsideLine, result);
          
          setLoading(false);
          setTimeout(() => setShowScanLine(false), 1000);
        }, 2000); // محاكاة وقت المعالجة
      };
      
      img.src = imageSrc;
    };
    
    analyzeImage();
  }, [imageSrc]);
  
  const drawAnalysis = (ctx, players, offsideLine, result) => {
    // رسم خط التسلل
    ctx.beginPath();
    ctx.strokeStyle = '#ff3333';
    ctx.lineWidth = 3;
    ctx.setLineDash([10, 5]);
    ctx.moveTo(offsideLine, 0);
    ctx.lineTo(offsideLine, ctx.canvas.height);
    ctx.stroke();
    
    // رسم اللاعبين
    players.forEach(player => {
      const isAttacker = player.team === 'attack';
      const isOffside = player.x > offsideLine && player.x > 400;
      
      // اختيار اللون
      ctx.fillStyle = isAttacker 
        ? (isOffside ? '#ff4444' : '#22ee66')
        : '#3d90ff';
      
      // رسم دائرة اللاعب
      ctx.beginPath();
      ctx.arc(player.x, player.y, 15, 0, Math.PI * 2);
      ctx.fill();
      
      // حدود بيضاء
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.stroke();
      
      // رقم اللاعب
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 12px "Cairo", Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(player.num, player.x, player.y);
      
      // علامة التسلل
      if (isAttacker && isOffside) {
        ctx.fillStyle = '#ff0000';
        ctx.font = 'bold 14px "Cairo", Arial';
        ctx.fillText('🚩', player.x - 25, player.y - 20);
      }
    });
    
    // رسم الكرة
    ctx.beginPath();
    ctx.arc(450, 250, 10, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 2;
    ctx.stroke();
    
    // إعادة تعيين الخط المتقطع
    ctx.setLineDash([]);
  };
  
  return (
    <div style={{ position: 'relative' }}>
      <canvas 
        ref={canvasRef} 
        style={{ 
          width: '100%', 
          height: 'auto', 
          border: '2px solid #2a5a2a',
          borderRadius: '8px'
        }} 
      />
      {showScanLine && <div className="scan-line" />}
      
      {loading && (
        <div style={{
          position: 'absolute',
          top: '50%',
          left: '50%',
          transform: 'translate(-50%, -50%)',
          background: 'rgba(0,0,0,0.8)',
          padding: '20px 40px',
          borderRadius: '10px',
          border: '2px solid #22ee66',
          color: '#22ee66',
          fontSize: '18px',
          fontWeight: 'bold'
        }}>
          🔍 جاري تحليل الصورة...
        </div>
      )}
      
      {analysis && !loading && (
        <div style={{
          position: 'absolute',
          top: 10,
          left: 10,
          background: 'rgba(10,20,10,0.95)',
          padding: '15px',
          borderRadius: '8px',
          border: `2px solid ${analysis.isOffside ? '#ff4444' : '#22ee66'}`,
          maxWidth: '250px'
        }}>
          <div style={{ 
            fontSize: '18px', 
            fontWeight: 'bold',
            color: analysis.isOffside ? '#ff8888' : '#88ff88',
            marginBottom: '10px'
          }}>
            {analysis.decision}
          </div>
          <div style={{ fontSize: '12px', color: '#aaccaa' }}>
            <div>⚽ ثقة التحليل: {analysis.confidence}%</div>
            <div>📏 خط التسلل: X = {analysis.lastDefenderLine.toFixed(0)}</div>
            <div>🚶 أبعد مهاجم: X = {analysis.furthestAttacker.x.toFixed(0)}</div>
            {analysis.isOffside && (
              <div style={{ color: '#ff8888' }}>
                📏 متقدم بـ: {analysis.distanceBeyond.toFixed(0)} بكسل
              </div>
            )}
            <hr style={{ borderColor: '#2a5a2a', margin: '8px 0' }} />
            <div style={{ fontSize: '10px', color: '#88aa88' }}>
              عدد اللاعبين: {players.length}<br/>
              مهاجمين: {players.filter(p => p.team === 'attack').length}<br/>
              مدافعين: {players.filter(p => p.team === 'defend').length}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// التطبيق الرئيسي
function App() {
  const [uploadedImage, setUploadedImage] = useState(null);
  const [imagePreview, setImagePreview] = useState(null);
  const [dragover, setDragover] = useState(false);
  const fileInputRef = useRef(null);
  
  const handleImageUpload = (file) => {
    if (!file || !file.type.startsWith('image/')) {
      alert('الرجاء اختيار صورة صالحة');
      return;
    }
    
    const reader = new FileReader();
    reader.onload = (e) => {
      setImagePreview(e.target.result);
      setUploadedImage(e.target.result);
    };
    reader.readAsDataURL(file);
  };
  
  const handleFileSelect = (e) => {
    const file = e.target.files[0];
    handleImageUpload(file);
  };
  
  const handleDragOver = (e) => {
    e.preventDefault();
    setDragover(true);
  };
  
  const handleDragLeave = () => {
    setDragover(false);
  };
  
  const handleDrop = (e) => {
    e.preventDefault();
    setDragover(false);
    
    const file = e.dataTransfer.files[0];
    handleImageUpload(file);
  };
  
  const handleReset = () => {
    setUploadedImage(null);
    setImagePreview(null);
    if (fileInputRef.current) {
      fileInputRef.current.value = '';
    }
  };
  
  return (
    <div style={{ 
      maxWidth: '1200px', 
      margin: '0 auto', 
      padding: '20px',
      direction: 'rtl'
    }}>
      {/* الهيدر */}
      <div style={{
        background: 'linear-gradient(90deg, #0b1e0c, #061007)',
        border: '1px solid #1a381a',
        borderRadius: '10px',
        padding: '20px',
        marginBottom: '20px',
        textAlign: 'center'
      }}>
        <h1 style={{ 
          color: '#22ee66', 
          fontSize: '32px',
          marginBottom: '5px',
          fontWeight: 'bold'
        }}>
          ⚽ VAR · OFFSIDE · AI ⚽
        </h1>
        <p style={{ color: '#88aa88', fontSize: '14px' }}>
          نظام تحليل التسلل بالذكاء الاصطناعي - ارفع صورة من الملعب وسنحدد لك حالة التسلل
        </p>
      </div>
      
      {/* منطقة رفع الصورة */}
      {!uploadedImage ? (
        <div 
          className={`upload-area ${dragover ? 'dragover' : ''}`}
          onDragOver={handleDragOver}
          onDragLeave={handleDragLeave}
          onDrop={handleDrop}
          style={{
            background: '#0a1a0a',
            border: `2px dashed ${dragover ? '#ffaa00' : '#2a5a2a'}`,
            borderRadius: '10px',
            padding: '50px',
            textAlign: 'center',
            cursor: 'pointer',
            transition: 'all 0.3s',
            marginBottom: '20px'
          }}
          onClick={() => fileInputRef.current?.click()}
        >
          <input 
            type="file" 
            ref={fileInputRef}
            onChange={handleFileSelect}
            accept="image/*"
            style={{ display: 'none' }}
          />
          
          <div style={{ fontSize: '50px', marginBottom: '20px' }}>📸</div>
          <div style={{ color: '#22ee66', fontSize: '20px', marginBottom: '10px' }}>
            اضغط أو اسحب وأفلت صورة هنا
          </div>
          <div style={{ color: '#5a8a5a', fontSize: '12px' }}>
            الصيغ المدعومة: JPG, PNG, GIF - الحد الأقصى 10MB
          </div>
          <div style={{ 
            marginTop: '20px', 
            color: '#3a6a3a', 
            fontSize: '11px',
            background: '#0f200f',
            padding: '10px',
            borderRadius: '5px'
          }}>
            💡 للحصول على أفضل النتائج، استخدم صوراً واضحة من زاوية جانبية تظهر جميع اللاعبين
          </div>
        </div>
      ) : (
        // عرض الصورة مع التحليل
        <div>
          <div style={{
            background: '#0a1a0a',
            border: '1px solid #1a381a',
            borderRadius: '10px',
            padding: '20px',
            marginBottom: '20px'
          }}>
            <ImageAnalyzer imageSrc={uploadedImage} />
          </div>
          
          {/* أزرار التحكم */}
          <div style={{
            display: 'flex',
            gap: '10px',
            justifyContent: 'center',
            marginBottom: '20px'
          }}>
            <button
              onClick={handleReset}
              style={{
                padding: '10px 30px',
                background: 'linear-gradient(90deg, #1a3a1a, #2a5a2a)',
                border: '1px solid #22ee66',
                borderRadius: '5px',
                color: 'white',
                fontSize: '14px',
                fontWeight: 'bold',
                cursor: 'pointer',
                display: 'flex',
                alignItems: 'center',
                gap: '5px'
              }}
            >
              <span>🔄</span>
              تحليل صورة جديدة
            </button>
            
            <button
              style={{
                padding: '10px 30px',
                background: 'linear-gradient(90deg, #1a3a5a, #2a5a7a)',
                border: '1px solid #3d90ff',
                borderRadius: '5px',
                color: 'white',
                fontSize: '14px',
                fontWeight: 'bold',
                cursor: 'pointer',
                display: 'flex',
                alignItems: 'center',
                gap: '5px'
              }}
              onClick={() => window.location.reload()}
            >
              <span>⚙️</span>
              إعدادات متقدمة
            </button>
          </div>
        </div>
      )}
      
      {/* شرح النظام */}
      <div style={{
        background: '#0a150a',
        border: '1px solid #1a381a',
        borderRadius: '8px',
        padding: '20px',
        marginTop: '30px'
      }}>
        <h3 style={{ color: '#22ee66', marginBottom: '15px' }}>🔬 كيف يعمل النظام؟</h3>
        
        <div style={{
          display: 'grid',
          gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))',
          gap: '15px'
        }}>
          <div style={{
            background: '#0f200f',
            padding: '15px',
            borderRadius: '5px',
            border: '1px solid #1a381a'
          }}>
            <div style={{ fontSize: '24px', marginBottom: '5px' }}>1️⃣</div>
            <div style={{ fontWeight: 'bold', color: '#22ee66', marginBottom: '5px' }}>كشف اللاعبين</div>
            <div style={{ fontSize: '12px', color: '#88aa88' }}>
              استخدام الذكاء الاصطناعي لتحديد مواقع اللاعبين في الصورة
            </div>
          </div>
          
          <div style={{
            background: '#0f200f',
            padding: '15px',
            borderRadius: '5px',
            border: '1px solid #1a381a'
          }}>
            <div style={{ fontSize: '24px', marginBottom: '5px' }}>2️⃣</div>
            <div style={{ fontWeight: 'bold', color: '#22ee66', marginBottom: '5px' }}>تحديد خط التسلل</div>
            <div style={{ fontSize: '12px', color: '#88aa88' }}>
              إيجاد ثاني آخر مدافع لتحديد خط التسلل المحتمل
            </div>
          </div>
          
          <div style={{
            background: '#0f200f',
            padding: '15px',
            borderRadius: '5px',
            border: '1px solid #1a381a'
          }}>
            <div style={{ fontSize: '24px', marginBottom: '5px' }}>3️⃣</div>
            <div style={{ fontWeight: 'bold', color: '#22ee66', marginBottom: '5px' }}>تطبيق القوانين</div>
            <div style={{ fontSize: '12px', color: '#88aa88' }}>
              مقارنة مواقع المهاجمين مع خط التسلل وحساب المسافات
            </div>
          </div>
          
          <div style={{
            background: '#0f200f',
            padding: '15px',
            borderRadius: '5px',
            border: '1px solid #1a381a'
          }}>
            <div style={{ fontSize: '24px', marginBottom: '5px' }}>4️⃣</div>
            <div style={{ fontWeight: 'bold', color: '#22ee66', marginBottom: '5px' }}>إصدار القرار</div>
            <div style={{ fontSize: '12px', color: '#88aa88' }}>
              تحديد حالة التسلل مع نسبة ثقة وتحليل مفصل
            </div>
          </div>
        </div>
        
        <div style={{
          marginTop: '20px',
          padding: '15px',
          background: '#0c1a0c',
          borderRadius: '5px',
          borderRight: '3px solid #22ee66',
          fontSize: '13px',
          color: '#aaccaa'
        }}>
          <strong style={{ color: '#22ee66' }}>⚽ قوانين التسلل المطبقة:</strong><br/>
          • أن يكون اللاعب في نصف ملعب الخصم<br/>
          • أن يكون أقرب لخط المرمى من ثاني آخر مدافع<br/>
          • أن يكون مشاركاً في اللعب النشط<br/>
          • لا يحتسب تسلل إذا كان اللاعب خلف الكرة
        </div>
      </div>
      
      {/* فوتر */}
      <div style={{
        marginTop: '20px',
        padding: '10px',
        textAlign: 'center',
        color: '#3a6a3a',
        fontSize: '11px',
        borderTop: '1px solid #1a381a'
      }}>
        VAR · OFFSIDE · AI v2.0 · جميع الحقوق محفوظة © 2026 FIFA
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
