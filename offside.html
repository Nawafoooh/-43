const FW = 760;
const FH = 480;
const OFFSIDE_X = 562;

// ─── DATA ─────────────────────────────────────────────────────────────────────
const PLAYERS = [
  {
    id:"A1", team:"attack", x:575, y:185, name:"Müller", num:9, offside:true, conf:0.97,

  },
  { id:"D1", team:"defend", x:568, y:135, name:"Rüdiger", num:5,  offside:false, conf:null },
  { id:"D2", team:"defend", x:564, y:325, name:"Süle",    num:15, offside:false, conf:null },

const JSON_DATA = {

};

// ─── CANVAS FIELD ─────────────────────────────────────────────────────────────
function FieldCanvas({ skeleton, lines, scanning }) {
  const canvasRef = useRef(null);
  const animRef   = useRef(null);
  const tick      = useRef(0);
  const scanY     = useRef(0);

  const render = useCallback(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const W = FW, H = FH;
    tick.current += 0.045;
    const pulse = Math.sin(tick.current);

    // ── Background grass stripes
    for (let i = 0; i < 10; i++) {
      ctx.fillStyle = i % 2 === 0 ? "#0d3318" : "#0a2b14";
      ctx.fillRect(i * (W / 10), 0, W / 10, H);
    }

    // ── Scan line effect
    if (scanning) {
      scanY.current = (scanY.current + 5) % (H + 80);
      const g = ctx.createLinearGradient(0, scanY.current - 40, 0, scanY.current + 40);
      g.addColorStop(0,   "rgba(34,238,102,0)");
      g.addColorStop(0.5, "rgba(34,238,102,0.1)");
      g.addColorStop(1,   "rgba(34,238,102,0)");
      ctx.fillStyle = g;
      ctx.fillRect(0, scanY.current - 40, W, 80);
    }

    // ── Field lines
    ctx.strokeStyle = "rgba(255,255,255,0.28)";
    ctx.lineWidth   = 1.5;
    ctx.setLineDash([]);

    // Boundary
    ctx.strokeRect(30, 20, W - 60, H - 40);

    // Halfway line
    ctx.beginPath(); ctx.moveTo(W/2, 20); ctx.lineTo(W/2, H-20); ctx.stroke();

    // Centre circle
    ctx.beginPath(); ctx.arc(W/2, H/2, 55, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(W/2, H/2, 3,  0, Math.PI*2);
    ctx.fillStyle = "rgba(255,255,255,0.35)"; ctx.fill();

    // Right penalty box (attack side)
    ctx.strokeRect(W-30-120, H/2-90, 120, 180);
    ctx.strokeRect(W-30-55,  H/2-45,  55,  90);

    // Left penalty box
    ctx.strokeRect(30,      H/2-90, 120, 180);
    ctx.strokeRect(30,      H/2-45,  55,  90);

    // Goals
    ctx.strokeStyle = "rgba(255,255,255,0.65)";
    ctx.lineWidth   = 2.5;
    ctx.strokeRect(W - 30, H/2 - 36, 18, 72);
    ctx.strokeRect(12,     H/2 - 36, 18, 72);

    // Penalty spots
    ctx.setLineDash([]);
    ctx.fillStyle = "rgba(255,255,255,0.35)";
    ctx.beginPath(); ctx.arc(W - 30 - 82, H/2, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(30 + 82,     H/2, 3, 0, Math.PI*2); ctx.fill();

    // ── Offside line
    if (lines) {
      const a = 0.7 + pulse * 0.2;
      ctx.save();
      ctx.strokeStyle = `rgba(255,50,50,${a})`;
      ctx.lineWidth   = 2.5;
      ctx.setLineDash([9, 5]);
      ctx.shadowColor = "rgba(255,50,50,0.85)";
      ctx.shadowBlur  = 14 + pulse * 6;
      ctx.beginPath();
      ctx.moveTo(OFFSIDE_X, 20);
      ctx.lineTo(OFFSIDE_X, H - 20);
      ctx.stroke();
      ctx.restore();

      ctx.save();
      ctx.setLineDash([]);
      ctx.fillStyle  = `rgba(255,70,70,${a})`;
      ctx.font       = "bold 10px 'Courier New'";
      ctx.textAlign  = "center";
      ctx.fillText("OFFSIDE LINE", OFFSIDE_X, 14);
      ctx.restore();
    }

    // ── Ball
    const bx = 495, by = 278;
    ctx.save();
    ctx.shadowColor = "rgba(255,255,255,0.8)";
    ctx.shadowBlur  = 12 + pulse * 4;
    ctx.beginPath(); ctx.arc(bx, by, 8, 0, Math.PI*2);
    ctx.fillStyle   = "white"; ctx.fill();
    ctx.setLineDash([]);
    ctx.strokeStyle = "#555"; ctx.lineWidth = 1; ctx.stroke();
    ctx.restore();

    // Ball contact ring
    if (lines) {
      ctx.save();
      ctx.strokeStyle = `rgba(255,210,0,${0.45 + pulse * 0.35})`;
      ctx.lineWidth   = 1.5;
      ctx.setLineDash([3, 3]);
      ctx.beginPath(); ctx.arc(bx, by, 18 + pulse * 4, 0, Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle  = `rgba(255,210,0,${0.65 + pulse * 0.2})`;
      ctx.font       = "bold 8px 'Courier New'";
      ctx.textAlign  = "center";
      ctx.fillText("⚽ CONTACT", bx, by - 26);
      ctx.restore();
    }

    // ── Players
    PLAYERS.forEach(p => {
      const isAtk = p.team === "attack";
      const isOff = p.offside;
      const color = isAtk
        ? (isOff ? "#ff3c3c" : "#22ee66")
        : (p.isGK ? "#f5c518" : "#3d90ff");

      // Skeleton body
      if (skeleton && p.bp) {
        ctx.save();
        ctx.strokeStyle = isOff ? "rgba(255,80,80,0.8)" : "rgba(34,238,102,0.8)";
        ctx.lineWidth   = 2;
        ctx.setLineDash([]);
        ctx.shadowBlur  = 4;
        ctx.shadowColor = isOff ? "rgba(255,60,60,0.5)" : "rgba(34,238,102,0.4)";
        for (let i = 0; i < p.bp.length - 1; i++) {
          ctx.beginPath();
          ctx.moveTo(p.bp[i][0],     p.bp[i][1]);
          ctx.lineTo(p.bp[i+1][0],   p.bp[i+1][1]);
          ctx.stroke();
        }
        p.bp.forEach(pt => {
          ctx.beginPath(); ctx.arc(pt[0], pt[1], 3, 0, Math.PI*2);
          ctx.fillStyle = isOff ? "#ff7070" : "#44ff88"; ctx.fill();
        });
        ctx.restore();
      }

      // Pulsing offside glow ring
      if (isAtk && isOff) {
        ctx.save();
        ctx.setLineDash([]);
        ctx.beginPath(); ctx.arc(p.x, p.y, 23 + pulse * 3, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(255,60,60,${0.2 + pulse * 0.15})`;
        ctx.lineWidth   = 4;
        ctx.stroke();
        ctx.restore();
      }

      // Player disc
      ctx.save();
      ctx.setLineDash([]);
      ctx.shadowColor = color;
      ctx.shadowBlur  = isAtk && isOff ? 18 + pulse * 8 : 5;
      ctx.beginPath(); ctx.arc(p.x, p.y, 16, 0, Math.PI*2);
      ctx.fillStyle   = color + "30"; ctx.fill();
      ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.stroke();

      // Jersey number
      ctx.shadowBlur = 0;
      ctx.fillStyle  = "white";
      ctx.font       = "bold 11px 'Courier New'";
      ctx.textAlign  = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(p.num, p.x, p.y);

      // Player name below
      ctx.font      = "8.5px 'Courier New'";
      ctx.fillStyle = color;
      ctx.textBaseline = "alphabetic";
      ctx.fillText(p.name, p.x, p.y + 28);
      ctx.restore();

      // OFFSIDE / ONSIDE label
      if (isAtk && lines) {
        ctx.save();
        ctx.setLineDash([]);
        ctx.textAlign = "center";
        if (isOff) {
          const a  = 0.85 + pulse * 0.15;
          const tw = ctx.measureText("▲ OFFSIDE").width + 10;
          ctx.fillStyle = `rgba(180,0,0,${a * 0.85})`;
          ctx.fillRect(p.x - tw/2, p.y - 44, tw, 14);
          ctx.fillStyle = `rgba(255,200,200,${a})`;
          ctx.font      = "bold 9px 'Courier New'";
          ctx.fillText("▲ OFFSIDE", p.x, p.y - 33);

          // Distance dashed line to offside line
          ctx.strokeStyle = "rgba(255,80,80,0.4)";
          ctx.lineWidth   = 1;
          ctx.setLineDash([4, 3]);
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(OFFSIDE_X, p.y);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.fillStyle = "rgba(255,130,130,0.9)";
          ctx.font      = "8px 'Courier New'";
          ctx.fillText("+" + (p.x - OFFSIDE_X) + "px", (p.x + OFFSIDE_X) / 2, p.y - 5);
        } else {
          ctx.fillStyle = "rgba(34,200,80,0.85)";
          ctx.font      = "bold 9px 'Courier New'";
          ctx.fillText("✓ ONSIDE", p.x, p.y - 30);
        }
        ctx.restore();
      }
    });

    animRef.current = requestAnimationFrame(render);
  }, [skeleton, lines, scanning]);

  useEffect(() => {
    animRef.current = requestAnimationFrame(render);
    return () => cancelAnimationFrame(animRef.current);
  }, [render]);

  return <canvas ref={canvasRef} width={FW} height={FH} />;
}

// ─── CONFIDENCE BAR ────────────────────────────────────────────────────────────
function ConfBar({ val }) {
  const pct   = Math.round(val * 100);
  const color = pct >= 95 ? "#22ee66" : pct >= 85 ? "#f5c518" : "#ff5555";
  return (
    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
      <div style={{ flex:1, height:5, background:"#0e1e0e", borderRadius:3, overflow:"hidden" }}>
        <div style={{ width:`${pct}%`, height:"100%", background:color, borderRadius:3, transition:"width 0.5s" }} />
      </div>
      <span style={{ color, fontSize:11, minWidth:34, fontFamily:"monospace" }}>{pct}%</span>
    </div>
  );
}

// ─── TOGGLE ────────────────────────────────────────────────────────────────────
function Toggle({ label, val, set }) {
  return (
    <label style={{ display:"flex", alignItems:"center", gap:6, cursor:"pointer", fontSize:10, color:"#5a8a5a", userSelect:"none" }}>
      <div
        onClick={() => set(!val)}
        style={{
          width:28, height:16, borderRadius:8,
          background: val ? "#22ee66" : "#172017",
          position:"relative", transition:"background 0.2s",
          border: "1px solid " + (val ? "#22ee66" : "#2a4a2a")
        }}
      >
        <div style={{
          position:"absolute", top:2,
          left: val ? 13 : 2,
          width:10, height:10, borderRadius:"50%",
          background: val ? "#080f08" : "#4a7a4a",
          transition:"left 0.2s"
        }} />
      </div>
      {label}
    </label>
  );
}

      </div>
      <div style={{ position:"relative", background:"#0a2c16", borderRadius:5, height:400, border:"1px solid #1a3c1a", overflow:"hidden" }}>
        {/* Field boundary */}
        <div style={{ position:"absolute", inset:18, border:"1px solid rgba(255,255,255,0.2)" }} />
        {/* Halfway */}
        <div style={{ position:"absolute", top:18, bottom:18, left:"50%", width:1, background:"rgba(255,255,255,0.18)" }} />
        {/* Centre circle approx */}
        <div style={{ position:"absolute", top:"50%", left:"50%", width:60, height:60, borderRadius:"50%", border:"1px solid rgba(255,255,255,0.15)", transform:"translate(-50%,-50%)" }} />
        {/* Right penalty box */}
        <div style={{ position:"absolute", top:"24%", bottom:"24%", right:18, width:"17%", border:"1px solid rgba(255,255,255,0.15)" }} />
        {/* Left penalty box */}
        <div style={{ position:"absolute", top:"24%", bottom:"24%", left:18, width:"17%", border:"1px solid rgba(255,255,255,0.15)" }} />
        {/* Offside line */}
        <div style={{ position:"absolute", top:18, bottom:18, left:"73%", width:2, background:"rgba(255,55,55,0.85)", boxShadow:"0 0 10px rgba(255,55,55,0.7)" }} />
        <div style={{ position:"absolute", top:6, left:"71%", color:"#ff6060", fontSize:8, fontWeight:"bold", letterSpacing:"0.05em" }}>OFFSIDE</div>

        {/* Players */}
        {PLAYERS.map(p => {
          const lx  = ((p.x - 30) / (FW - 60)) * 90 + 5;
          const ly  = ((p.y - 20) / (FH - 40)) * 90 + 5;
          const col = p.team === "attack"
            ? (p.offside ? "#ff4040" : "#22ee66")
            : (p.isGK ? "#f5c518" : "#3d90ff");
          return (
            <div key={p.id} title={p.name + " #" + p.num} style={{
              position:"absolute", left:`${lx}%`, top:`${ly}%`,
              width:11, height:11, borderRadius:"50%",
              background:col, transform:"translate(-50%,-50%)",
              border:"1.5px solid rgba(255,255,255,0.4)",
              boxShadow: p.offside ? "0 0 8px rgba(255,60,60,0.9)" : "none",
              cursor:"default"
            }}>
              <span style={{ position:"absolute", top:-13, left:"50%", transform:"translateX(-50%)", fontSize:7, color:"rgba(255,255,255,0.7)", whiteSpace:"nowrap" }}>{p.name}</span>
            </div>
          );
        })}
        {/* Ball */}
        <div style={{
          position:"absolute",
          left: `${((495 - 30) / (FW - 60)) * 90 + 5}%`,
          top:  `${((278 - 20) / (FH - 40)) * 90 + 5}%`,
          width:9, height:9, borderRadius:"50%",
          background:"white", transform:"translate(-50%,-50%)",
          boxShadow:"0 0 8px rgba(255,255,255,0.9)"
        }} />
      </div>
    </div>
  );
}

        <div style={{ display:"flex", alignItems:"center", gap:18 }}>
          <div style={{ textAlign:"right" }}>
            <div style={{ fontSize:8.5, color:"#3a6030" }}>LIVE MATCH</div>
            <div style={{ fontSize:13, color:"#c8e6c9", fontWeight:"bold" }}>UCL QF · 47:23</div>
          </div>
          <div style={{
            padding:"4px 12px", borderRadius:4, fontSize:11, letterSpacing:"0.1em",
            background: scanning ? "rgba(255,50,50,0.1)" : "rgba(34,238,102,0.1)",
            border: `1px solid ${scanning ? "#ff4040" : "#22ee66"}`,
            color: scanning ? "#ff5555" : "#22ee66",
            animation: scanning ? "blink 0.7s infinite" : "none"
          }}>
            {scanning ? "● SCANNING" : "● READY"}
          </div>
          <div style={{ fontSize:9.5, color:"#3a6030" }}>CAM 3/6 · HD 1080p · {clock}</div>
        </div>
      </div>

      {/* ══ BODY ════════════════════════════════════════════════════════════════ */}
      <div style={{ maxWidth:1300, margin:"0 auto", padding:"16px 16px 0" }}>

        {/* Alert banner */}
        {showResult && (
          <div style={{
            background:"linear-gradient(90deg,rgba(255,45,45,0.13),rgba(255,45,45,0.03))",
            border:"1px solid rgba(255,55,55,0.42)",
            borderRadius:7, padding:"11px 18px", marginBottom:16,
            display:"flex", alignItems:"center", gap:16,
            animation:"fadeIn 0.4s ease"
          }}>
            <div style={{ fontSize:26 }}>🚩</div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:14, fontWeight:"bold", color:"#ff5555", letterSpacing:"0.05em" }}>
                OFFSIDE DETECTED — {offCount} PLAYERS IN OFFSIDE POSITION
              </div>
              <div style={{ fontSize:9.5, color:"#7a3535", marginTop:2 }}>
                Frame #84234 · Contact at (495,278) · 2nd-last defender Süle at x={OFFSIDE_X} · {offCount}/3 attackers flagged
              </div>
            </div>
            <div style={{ textAlign:"right" }}>
              <div style={{ fontSize:8.5, color:"#4a7a4a", letterSpacing:"0.1em" }}>CONFIDENCE</div>
              <div style={{ fontSize:24, fontWeight:"bold", color:"#22ee66" }}>96.2%</div>
            </div>
          </div>
        )}

        <div style={{ display:"grid", gridTemplateColumns:"1fr 330px", gap:16 }}>

          {/* ── LEFT PANEL ────────────────────────────────────────────────────── */}
          <div>
            {/* Tabs */}
            <div style={{
              display:"flex", gap:2,
              background:"#080f08",
              border:"1px solid #1a381a", borderBottom:"none",
              borderRadius:"7px 7px 0 0",
              padding:"6px 10px 0"
            }}>
              {[["field","📹 Broadcast"],["topdown","🔭 Top-Down"],["report","📋 Report"]].map(([k,l]) => (
                <button key={k} style={tabStyle(tab===k)} onClick={() => setTab(k)}>{l}</button>
              ))}
              <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:12, paddingBottom:6 }}>
                <Toggle label="Skeleton" val={skeleton} set={setSkeleton} />
                <Toggle label="Lines"    val={lines}    set={setLines}    />
              </div>
            </div>

            {/* Viewer box */}
            <div style={{ ...panelStyle, borderRadius:"0 0 7px 7px", borderTop:"none" }}>
              {tab === "field"   && <FieldCanvas skeleton={skeleton} lines={lines} scanning={scanning} />}
              {tab === "topdown" && <TopDownView />}
              {tab === "report"  && <ReportView  />}

              {/* Toolbar */}
              <div style={{ borderTop:"1px solid #1a381a", padding:"8px 14px", display:"flex", alignItems:"center", gap:12, background:"#060d06" }}>
                <button
                  onClick={runScan}
                  disabled={scanning}
                  style={{
                    padding:"6px 18px",
                    background: scanning ? "#131e13" : "linear-gradient(90deg,#0b5822,#22ee66)",
                    border:"none", borderRadius:5,
                    color: scanning ? "#3a5a3a" : "#060d06",
                    fontWeight:"bold", fontSize:11, letterSpacing:"0.05em",
                    opacity: scanning ? 0.7 : 1
                  }}
                >
                  {scanning ? "⟳ ANALYZING..." : "▶ RUN SCAN"}
                </button>
                <span style={{ color:"#183218" }}>|</span>
                <span style={{ fontSize:9.5, color:"#3a6030" }}>FPS: 60 · LATENCY: 34ms · SAOT 29pt · GPU: A100</span>
                <div style={{ marginLeft:"auto", fontSize:9, color:"#223022" }}>FRAME #84234 · {clock}</div>
              </div>
            </div>
          </div>

          {/* ── RIGHT PANEL ───────────────────────────────────────────────────── */}
          <div style={{ display:"flex", flexDirection:"column", gap:13 }}>

            {/* Player tracking */}
            <div style={panelStyle}>
              <div style={headStyle}>
                <span>PLAYER DETECTION</span>
                <span style={{ color:"#22ee66" }}>{PLAYERS.length} TRACKED</span>
              </div>

              {/* Attackers */}
              {PLAYERS.filter(p => p.team === "attack").map(p => (
                <div key={p.id} style={{ padding:"9px 14px", borderBottom:"1px solid #0d1c0d" }}>
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:5 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <div style={{
                        width:24, height:24, borderRadius:"50%",
                        background: p.offside ? "rgba(255,60,60,0.12)" : "rgba(34,238,102,0.1)",
                        border:`2px solid ${p.offside ? "#ff4040" : "#22ee66"}`,
                        display:"flex", alignItems:"center", justifyContent:"center",
                        fontSize:10, color: p.offside ? "#ff6060" : "#22ee66", fontWeight:"bold"
                      }}>{p.num}</div>
                      <div>
                        <div style={{ fontSize:11, color:"#c8e6c9", fontWeight:"bold" }}>{p.name}</div>
                        <div style={{ fontSize:8.5, color:"#3a6030" }}>ATK · ({p.x},{p.y})</div>
                      </div>
                    </div>
                    <div style={{
                      fontSize:9, fontWeight:"bold",
                      color: p.offside ? "#ff5555" : "#22ee66",
                      padding:"2px 7px", borderRadius:3,
                      background: p.offside ? "rgba(255,60,60,0.1)" : "rgba(34,238,102,0.1)",
                      border:`1px solid ${p.offside ? "rgba(255,60,60,0.35)" : "rgba(34,238,102,0.35)"}`
                    }}>
                      {p.offside ? "OFFSIDE" : "ONSIDE"}
                    </div>
                  </div>
                  <ConfBar val={p.conf} />
                  {p.offside && (
                    <div style={{ fontSize:8, color:"#7a3535", marginTop:3 }}>
                      Advanced {p.x - OFFSIDE_X}px beyond the offside line
                    </div>
                  )}
                </div>
              ))}

              {/* Defenders */}
              <div style={{ padding:"5px 14px 8px", borderTop:"1px solid #0d1c0d" }}>
                <div style={{ fontSize:8.5, color:"#2a4a2a", letterSpacing:"0.1em", marginBottom:4 }}>DEFENDERS</div>
                {PLAYERS.filter(p => p.team === "defend").map(p => (
                  <div key={p.id} style={{ display:"flex", alignItems:"center", gap:7, padding:"3px 0", borderBottom:"1px solid #0a160a" }}>
                    <div style={{
                      width:16, height:16, borderRadius:"50%", flexShrink:0,
                      background: p.isGK ? "rgba(245,197,24,0.12)" : "rgba(61,144,255,0.1)",
                      border:`1.5px solid ${p.isGK ? "#f5c518" : "#3d90ff"}`,
                      display:"flex", alignItems:"center", justifyContent:"center",
                      fontSize:7, color: p.isGK ? "#f5c518" : "#3d90ff", fontWeight:"bold"
                    }}>{p.num}</div>
                    <div style={{ fontSize:9.5, color:"#5a8a5a" }}>{p.name}{p.isGK ? " (GK)" : ""}</div>
                    <div style={{ marginLeft:"auto", fontSize:8, color:"#2a4a2a" }}>x={p.x}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Event log */}
            <div style={panelStyle}>
              <div style={headStyle}>
                <span>EVENT LOG</span>
                <span style={{ color:"#2a4a2a" }}>47:23</span>
              </div>
              {EVENTS.map(ev => (
                <div key={ev.id} style={{ padding:"8px 14px", borderBottom:"1px solid #0b190b", display:"flex", alignItems:"center", gap:10 }}>
                  <div style={{
                    width:8, height:8, borderRadius:"50%", flexShrink:0,
                    background: ev.status === "OFFSIDE" ? "#ff4040" : "#22ee66",
                    boxShadow:`0 0 5px ${ev.status === "OFFSIDE" ? "#ff4040" : "#22ee66"}`
                  }} />
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:11, fontWeight:"bold", color: ev.status === "OFFSIDE" ? "#ff8888" : "#70e870" }}>
                      {ev.player} · {ev.status}
                    </div>
                    <div style={{ fontSize:8.5, color:"#2a4a2a" }}>{ev.time} · conf: {Math.round(ev.conf*100)}%</div>
                  </div>
                  <div style={{
                    fontSize:8, padding:"2px 6px", borderRadius:3,
                    color: ev.status === "OFFSIDE" ? "#7a3535" : "#2a5a3a",
                    border:`1px solid ${ev.status === "OFFSIDE" ? "rgba(255,60,60,0.25)" : "rgba(34,238,102,0.25)"}`
                  }}>FLAG</div>
                </div>
              ))}
            </div>

            {/* JSON Output */}
            <div style={panelStyle}>
              <div style={{ ...headStyle, cursor:"pointer" }} onClick={() => setJsonOpen(!jsonOpen)}>
                <span>JSON OUTPUT <span style={{ color:"#2a4a2a" }}>{jsonOpen ? "▲" : "▼"}</span></span>
                <button
                  onClick={(e) => { e.stopPropagation(); copyJSON(); }}
                  style={{
                    background:"transparent",
                    border:`1px solid ${copied ? "#22ee66" : "#2a4a2a"}`,
                    borderRadius:3, padding:"2px 8px", fontSize:9,
                    color: copied ? "#22ee66" : "#2a5a2a"
                  }}
                >
                  {copied ? "✓ COPIED" : "COPY"}
                </button>
              </div>
              {jsonOpen ? (
                <pre style={{ margin:0, padding:"10px 14px", fontSize:8.5, color:"#3a7a3a", background:"#050c05", overflowX:"auto", maxHeight:200, overflowY:"auto", lineHeight:1.7 }}>
                  {JSON.stringify(JSON_DATA, null, 2)}
                </pre>
              ) : (
                <div style={{ padding:"7px 14px", fontSize:9, color:"#2a4a2a" }}>
                  {PLAYERS.filter(p=>p.team==="attack").length} player records · click to expand
                </div>
              )}
            </div>
          </div>
        </div>

        {/* ══ METRICS ════════════════════════════════════════════════════════════ */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:10, marginTop:14 }}>
          {[
            { label:"DETECTION ACCURACY", val:"97.4%",    color:"#22ee66" },
            { label:"FRAMES PROCESSED",   val:"84,234",   color:"#3d90ff" },
            { label:"AVG LATENCY",        val:"34ms",     color:"#22ee66" },
            { label:"CAMERAS ACTIVE",     val:"3 / 6",    color:"#f5c518" },
            { label:"OFFSIDE FLAGS",      val:`${offCount} / 3`, color:"#ff5555" },
          ].map(m => (
            <div key={m.label} style={{ background:"#09160a", border:"1px solid #1a381a", borderRadius:6, padding:"10px 14px" }}>
              <div style={{ fontSize:8, color:"#3a6030", letterSpacing:"0.1em", marginBottom:4 }}>{m.label}</div>
              <div style={{ fontSize:20, fontWeight:"bold", color:m.color, fontFamily:"monospace" }}>{m.val}</div>
            </div>
          ))}
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
